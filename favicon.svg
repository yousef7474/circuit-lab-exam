<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- background -->
  <rect width="64" height="64" fill="#faf7f0" rx="10"/>
  <!-- corner accents -->
  <path d="M4 12V4h8" fill="none" stroke="#b8860b" stroke-width="2" stroke-linecap="round"/>
  <path d="M52 4h8v8" fill="none" stroke="#b8860b" stroke-width="2" stroke-linecap="round"/>
  <path d="M60 52v8h-8" fill="none" stroke="#b8860b" stroke-width="2" stroke-linecap="round"/>
  <path d="M12 60H4v-8" fill="none" stroke="#b8860b" stroke-width="2" stroke-linecap="round"/>
  <!-- microcontroller chip -->
  <rect x="18" y="18" width="28" height="28" rx="2" fill="none" stroke="#b8860b" stroke-width="2.5"/>
  <rect x="24" y="24" width="16" height="16" fill="#b8860b" opacity="0.25"/>
  <circle cx="32" cy="32" r="2.5" fill="#b8860b"/>
  <!-- pins left -->
  <line x1="10" y1="24" x2="18" y2="24" stroke="#b8860b" stroke-width="2.4" stroke-linecap="round"/>
  <line x1="10" y1="32" x2="18" y2="32" stroke="#b8860b" stroke-width="2.4" stroke-linecap="round"/>
  <line x1="10" y1="40" x2="18" y2="40" stroke="#b8860b" stroke-width="2.4" stroke-linecap="round"/>
  <!-- pins right -->
  <line x1="46" y1="24" x2="54" y2="24" stroke="#b8860b" stroke-width="2.4" stroke-linecap="round"/>
  <line x1="46" y1="32" x2="54" y2="32" stroke="#b8860b" stroke-width="2.4" stroke-linecap="round"/>
  <line x1="46" y1="40" x2="54" y2="40" stroke="#b8860b" stroke-width="2.4" stroke-linecap="round"/>
  <!-- pins top -->
  <line x1="24" y1="10" x2="24" y2="18" stroke="#b8860b" stroke-width="2.4" stroke-linecap="round"/>
  <line x1="32" y1="10" x2="32" y2="18" stroke="#b8860b" stroke-width="2.4" stroke-linecap="round"/>
  <line x1="40" y1="10" x2="40" y2="18" stroke="#b8860b" stroke-width="2.4" stroke-linecap="round"/>
  <!-- pins bottom -->
  <line x1="24" y1="46" x2="24" y2="54" stroke="#b8860b" stroke-width="2.4" stroke-linecap="round"/>
  <line x1="32" y1="46" x2="32" y2="54" stroke="#b8860b" stroke-width="2.4" stroke-linecap="round"/>
  <line x1="40" y1="46" x2="40" y2="54" stroke="#b8860b" stroke-width="2.4" stroke-linecap="round"/>
</svg>
